<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>검색 결과 - JPGGIF</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --primary-color: #20b2aa;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-color); color: var(--text-color); padding-top: 55px; padding-bottom: 60px; }
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 55px; background-color: var(--card-bg);
            border-bottom: 2px solid var(--primary-color); display: flex; align-items: center; padding: 0 15px; z-index: 1000;
        }
        .back-btn { background: none; border: none; font-size: 1.25rem; cursor: pointer; }
        .header-title { margin-left: 15px; font-size: 1.05rem; font-weight: 800; }
        .container { max-width: 600px; margin: 10px auto; padding: 0 10px; }
        .result-info-box { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; margin-bottom: 12px; font-size: 0.95rem; }
        .query-highlight { color: var(--primary-color); font-weight: 800; }
        .board-section { background-color: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); overflow: hidden; }
        
        /* 글 목록 아이템 디자인 */
        .post-row { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f1f5f9; gap: 12px; text-decoration: none; color: inherit; }
        .post-row:hover { background-color: #f8fafc; }
        .thumbnail-box { width: 50px; height: 50px; background-color: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 0.7rem; flex-shrink: 0; }
        .post-info { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
        .post-title-wrapper { display: flex; align-items: center; gap: 5px; }
        .board-badge { background-color: #f1f5f9; color: var(--text-muted); font-size: 0.7rem; padding: 2px 5px; border-radius: 4px; font-weight: 700; }
        .post-title { font-size: 0.9rem; font-weight: 700; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
        .post-meta { font-size: 0.75rem; color: var(--text-muted); }
        
        .no-results { padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 0.9rem; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background-color: #ffffff; border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .bottom-nav-btn { background: none; border: none; font-size: 1.1rem; color: var(--text-muted); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <button class="back-btn" onclick="location.href='search.html'"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="header-title">검색 결과 리스트</div>
    </header>

    <div class="container">
        <div class="result-info-box" id="searchSummary">검색어를 분석 중입니다...</div>
        <section class="board-section">
            <div id="resultList"></div>
        </section>
    </div>

    <div class="bottom-nav">
        <button class="bottom-nav-btn" onclick="history.back()"><i class="fa-solid fa-chevron-left"></i></button>
        <button class="bottom-nav-btn" onclick="history.forward()"><i class="fa-solid fa-chevron-right"></i></button>
        <button class="bottom-nav-btn" onclick="location.href='index.html'"><i class="fa-solid fa-house"></i></button>
    </div>

    <script>
        // [창고 데이터] 여기에 등록된 글들을 기준으로 검색 결과가 매칭됩니다!
        const POSTS_DATABASE = [
            { id: 'post_notice_1.html', board: '공지사항', title: '전체 검색 기능을 정식 오픈했습니다', date: '2026-03-16' },
            { id: 'post_notice_2.html', board: '공지사항', title: '시스템 서버 점검 안내문', date: '2026-02-10' },
            { id: 'post_lion_1.html', board: '사자', title: '아프리카 세렝게티 초원의 수사자 무리 영상', date: '2026-07-15' },
            { id: 'post_lion_2.html', board: '사자', title: '동물원에서 사자가 포효하는 소리 들어보셨나요', date: '2026-07-10' },
            { id: 'post_tiger_1.html', board: '호랑이', title: '눈 덮인 산속을 걸어 다니는 백호 시베리아 호랑이 포스', date: '2026-07-14' },
            { id: 'post_scorpion_1.html', board: '전갈', title: '애완용 황제전갈 키울 때 주의해야 할 세 가지 정보', date: '2026-07-13' }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            // 주소창에서 배달된 검색 단어 분리해내기 (?q=단어)
            const params = new URLSearchParams(window.location.search);
            const query = params.get('q') ? params.get('q').trim() : '';
            
            const summaryBox = document.getElementById('searchSummary');
            const listContainer = document.getElementById('resultList');

            if (!query) {
                summaryBox.innerHTML = '입력된 검색어가 없습니다.';
                return;
            }

            // [대조 작업] 단어가 제목이나 게시판 이름에 섞여 있는지 판별
            const matchedPosts = POSTS_DATABASE.filter(post => {
                return post.title.includes(query) || post.board.includes(query);
            });

            // 요약 가이드라인 수정
            summaryBox.innerHTML = `"<span class="query-highlight">${query}</span>" 검색 결과 (총 <b>${matchedPosts.length}</b>건)`;

            if (matchedPosts.length === 0) {
                listContainer.innerHTML = '<div class="no-results"><i class="fa-regular fa-folder-open" style="font-size:2rem; color:#cbd5e1; margin-bottom:8px;"></i><br>일치하는 검색 결과가 없습니다.</div>';
                return;
            }

            // 매칭된 글들을 화면에 하나씩 예쁘게 포장해서 출력
            listContainer.innerHTML = '';
            matchedPosts.forEach(post => {
                const link = document.createElement('a');
                link.href = post.id;
                link.className = 'post-row';
                link.innerHTML = `
                    <div class="thumbnail-box">IMAGE</div>
                    <div class="post-info">
                        <div class="post-title-wrapper">
                            <span class="board-badge">${post.board}</span>
                            <span class="post-title">${post.title}</span>
                        </div>
                        <div class="post-meta">작성일: ${post.date}</div>
                    </div>
                `;
                listContainer.appendChild(link);
            });
        });
    </script>
</body>
</html>
